<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammy Topup Terpercaya</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
}
.header{
background:linear-gradient(to right,#ff0000,#ff6600);
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}
.container{
padding:20px;
max-width:500px;
margin:auto;
}
.card{
background:#1c1c1c;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(255,0,0,0.3);
}
label{
color:orange;
font-weight:bold;
}
select,input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:15px;
}
button{
width:100%;
padding:15px;
background:#ff0000;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}
button:hover{
background:#cc0000;
}
.footer{
text-align:center;
padding:15px;
margin-top:20px;
background:#1c1c1c;

</head>

<body>

<div class="header">
🔥 Sammy Topup Terpercaya 🔥
</div>

<div class="container">
<div class="card">

<label>Pilih Game</label>

<option>Free Fire</option>

<option>PUBG Mobile</option>
<option>Genshin Impact</option>
</select>

<label>ID Game</label>
<input type="text" id="idgame" placeholder="Masukkan ID Game">

<label>Jumlah Diamond</label>
<select id="diamond">
<option>5 Diamond - Rp750</option>
<option>10 Diamond - Rp1.500</option>

<select id="metode">
<option>DANA</option>
<option>OVO</option>
<option>GoPay</option>
<option>QRIS</option>
<option>Transfer Bank</option>
</select>

<button onclick="kirimWA()">Pesan Sekarang</button>

</div>
</div>

<div class="footer">
© 2026 Sammy Topup Terpercaya | WhatsApp: 083107288718
</div>

<script>
function kirimWA(){

var id=document.getElementById("idgame").value;
var diamond=document.getElementById("diamond").value;
var metode=document.getElementById("metode").value;

if(id==""){
alert("Masukkan ID Game dulu!");
return;
}

var pesan="Halo Admin Sammy Topup Terpercaya%0A%0ASaya ingin topup:%0A%0AGame: "+game+
"%0AID: "+id+
"%0ADiamond: "+diamond+
"%0AMetode Pembayaran: "+metode+

window.open("https://wa.me/6283107288718?text="+pesan,"_blank");
}
</script>

</html>
