<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammy Topup Terpercaya</title>
<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}
.header{
background:linear-gradient(to right,red,orange);
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}
.container{
padding:20px;
}
.card{
background:#1c1c1c;
padding:20px;
border-radius:10px;
}
label{
color:orange;
font-weight:bold;
}
select,input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:15px;
}
button{
width:100%;
padding:15px;
background:red;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
button:hover{
background:darkred;
}
.footer{
text-align:center;
padding:15px;
margin-top:20px;
background:#1c1c1c;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
🔥 Sammy Topup Terpercaya 🔥
</div>

<div class="container">
<div class="card">

<label>Pilih Game</label>
<select id="game">
<option>Free Fire</option>
<option>Mobile Legends</option>
<option>PUBG Mobile</option>
<option>Genshin Impact</option>
</select>

<label>ID Game</label>
<input type="text" id="idgame" placeholder="Masukkan ID Game">

<label>Jumlah Diamond</label>
<select id="diamond">
<option value="1000">1 Diamond - Rp1.000</option>
<option value="5000">5 Diamond - Rp5.000</option>
<option value="10000">10 Diamond - Rp10.000</option>
<option value="20000">20 Diamond - Rp20.000</option>
<option value="50000">50 Diamond - Rp50.000</option>
<option value="100000">100 Diamond - Rp100.000</option>
<option value="500000">500 Diamond - Rp500.000</option>
<option value="1000000">1000 Diamond - Rp1.000.000</option>
</select>

<label>Metode Pembayaran</label>
<select id="metode">
<option>DANA</option>
<option>OVO</option>
<option>GoPay</option>
<option>QRIS</option>
<option>Transfer Bank</option>
</select>

<button onclick="kirimWA()">Pesan Sekarang</button>

</div>
</div>

<div class="footer">
© 2026 Sammy Topup Terpercaya | WhatsApp: 083107288718
</div>

<script>
function kirimWA(){
var game=document.getElementById("game").value;
var id=document.getElementById("idgame").value;
var diamond=document.getElementById("diamond").options[document.getElementById("diamond").selectedIndex].text;
var metode=document.getElementById("metode").value;

if(id==""){
alert("Masukkan ID Game dulu!");
return;
}

var pesan="Halo Admin Sammy Topup Terpercaya%0A%0ASaya ingin topup:%0A%0AGame: "+game+
"%0AID: "+id+
"%0ADiamond: "+diamond+
"%0AMetode Pembayaran: "+metode+
"%0A%0AMohon diproses ya.";

window.open("https://wa.me/6283107288718?text="+pesan,"_blank");
}
</script>

</body>
</html>
