<style>

header{

padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

h2{
margin-top:0;

}

input,select{
width:100%;

<body>

<option>PUBG Mobile</option>

<h2>ID Game</h2>

<h2>Jumlah Diamond</h2>

}

var pesan="Halo Sammy Topup, saya mau topup %0A"+
"Game: "+game+"%0A"+
"ID: "+id+"%0A"+
